<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>每日打卡</title>
<meta name="theme-color" content="#f5f5f7">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#f5f5f7;--app-bg:rgba(245,245,247,0.85);--surf:#fff;--surf2:#f0f0f5;--bdr:rgba(0,0,0,0.08);--acc:#6c5ce7;--acc-soft:#ede9ff;--text:#1a1a2e;--muted:#888899;--ok:#00b894;--danger:#e17055;--rad:12px}
.dk{--bg:#0f0f1a;--app-bg:rgba(15,15,26,0.85);--surf:#1a1a2e;--surf2:#242438;--bdr:rgba(255,255,255,0.1);--acc:#7c6fff;--acc-soft:#2a2450;--text:#e8e8f0;--muted:#8888aa}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;transition:background .3s,color .3s}

/* 加上背景圖時的毛玻璃設定 */
body.has-bg { background-attachment: fixed; background-size: cover; background-position: center; }
body.has-bg #app { background: var(--app-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); min-height: 100vh; }

/* ===== AUTH ===== */
#auth{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:28px;padding:32px;position:relative;
  background:#fff;background-size:cover;background-position:center;background-repeat:no-repeat;
}
#auth-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s;pointer-events:none}
#auth.has-bg #auth-overlay{background:rgba(0,0,0,0.45);backdrop-filter:blur(2px)}
#auth>*{position:relative;z-index:1}
.logo h1{font-size:2.2rem;font-weight:800;letter-spacing:-1.5px;text-align:center;color:var(--text)}
.logo h1 span{color:var(--acc)}
.logo p{color:var(--muted);margin-top:6px;text-align:center;font-size:.95rem}
#auth.has-bg .logo h1{color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#auth.has-bg .logo h1 span{color:#b8a8ff}
#auth.has-bg .logo p{color:rgba(255,255,255,.85)}
#gsb{
  display:flex;align-items:center;gap:12px;
  background:var(--surf);color:var(--text);
  border:1.5px solid var(--bdr);border-radius:12px;
  padding:14px 28px;font-size:1rem;font-weight:600;cursor:pointer;
  transition:all .2s;
}
#gsb img{width:22px}
#auth.has-bg #gsb{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);color:#fff;border-color:rgba(255,255,255,.3)}
#auth.has-bg #gsb img{filter:brightness(0) invert(1)}
#bg-btn{
  position:absolute;top:16px;right:16px;
  background:rgba(0,0,0,.1);border:1.5px solid rgba(0,0,0,.15);
  color:var(--text);width:36px;height:36px;border-radius:50%;
  cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;z-index:2;
}
#auth.has-bg #bg-btn{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
#bg-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;display:none}
#auth.has-bg .spinner{border-color:rgba(255,255,255,.3);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
#login-status{color:var(--muted);font-size:.88rem;display:none}
#auth.has-bg #login-status{color:rgba(255,255,255,.8)}
#aerr{color:#e17055;font-size:.88rem;display:none;text-align:center}

/* ===== APP ===== */
#app{display:none}
header{background:transparent;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
header h1{font-size:.95rem;font-weight:700}
.ib{background:var(--surf2);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.uav{width:30px;height:30px;border-radius:50%;border:2px solid var(--acc);cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.tabs{display:flex;background:transparent;border-bottom:1px solid var(--bdr);position:sticky;top:53px;z-index:99;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.tb{flex:1;padding:9px 4px;background:none;border:none;color:var(--muted);font-size:.75rem;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent}
.tb.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
.bd{padding:12px;padding-bottom:72px}
.dbar{background:var(--surf);border-radius:var(--rad);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;border:0.5px solid var(--bdr)}
.db{background:var(--surf2);border:none;color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:1rem}
.dc{flex:1;text-align:center;cursor:pointer;padding:3px 6px;border-radius:8px}
.dc:hover{background:var(--surf2)}
.dc h2{font-size:.9rem;font-weight:700}
.dc p{font-size:.7rem;color:var(--muted);margin-top:1px}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.sc{background:var(--surf);border-radius:10px;padding:10px 4px;text-align:center;border:0.5px solid var(--bdr);cursor:pointer;transition:transform .12s}
.sc:hover{border-color:var(--acc);transform:scale(1.04)}
.sc:active{transform:scale(.96)}
.sc i{font-size:1.1rem;display:block}
.sc v{display:block;font-size:.82rem;font-weight:700;color:var(--acc);margin-top:2px}
.sc l{display:block;font-size:.6rem;color:var(--muted);margin-top:1px}
.sc h{display:block;font-size:.58rem;color:var(--acc);margin-top:2px;opacity:.75}
.tl{position:relative;padding-left:12px}
.tl::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:2px;background:var(--bdr)}
.te{text-align:center;padding:32px 16px;color:var(--muted);font-size:.85rem}
.ti{display:flex;gap:10px;margin-bottom:9px;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.td2{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0;margin-top:8px;position:relative;z-index:1}
.dex{background:#dff9fb}.dml{background:#fef3cd}.dsl{background:#e8d5f5}.dep{background:#ffe0e0}
.dk .dex{background:#0d4f5c}.dk .dml{background:#5c4a00}.dk .dsl{background:#3d2a5c}.dk .dep{background:#5c1515}
.tc{flex:1;background:var(--surf);border-radius:10px;padding:9px 11px;border:0.5px solid var(--bdr);cursor:pointer;transition:transform .1s}
.tc:active{transform:scale(.98)}
.th{display:flex;align-items:center;justify-content:space-between}
.tn{font-weight:600;font-size:.88rem}
.tt{font-size:.72rem;color:var(--muted)}
.tdt{font-size:.8rem;color:var(--muted);margin-top:2px}
.bg{display:inline-block;padding:2px 6px;border-radius:20px;font-size:.7rem;font-weight:600;margin-top:4px;margin-right:3px}
.bex{background:#dff9fb;color:#00838f}.bml{background:#fef3cd;color:#9d6b00}.bsl{background:#e8d5f5;color:#7b3fa0}.bok{background:var(--acc-soft);color:var(--acc)}.bep{background:#ffe0e0;color:#c0392b}
.dk .bex{background:#0d4f5c;color:#4dd6e0}.dk .bml{background:#5c4a00;color:#ffd97d}.dk .bsl{background:#3d2a5c;color:#c49beb}.dk .bep{background:#5c1515;color:#ff7675}
.fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--acc);color:#fff;border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(108,92,231,.45);z-index:200}

/* ===== 痛圖區 (Ita-pic) ===== */
.ita-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:10px; }
.ita-item { position:relative; aspect-ratio:3/4; border-radius:12px; overflow:hidden; background:var(--surf); border:1.5px solid var(--bdr); box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.ita-item img { width:100%; height:100%; object-fit:cover; display:block; }
.ita-del { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); color:#fff; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; cursor:pointer; border:none; backdrop-filter:blur(4px); transition:transform 0.1s; }
.ita-del:active { transform:scale(0.9); }
.ita-add { aspect-ratio:3/4; border-radius:12px; border:2px dashed var(--muted); display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); cursor:pointer; background:transparent; transition:all 0.2s; }
.ita-add:hover { border-color:var(--acc); color:var(--acc); background:var(--acc-soft); }
.ita-add i { font-size:2rem; margin-bottom:4px; }

/* ===== MODAL ===== */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.38);display:none;align-items:flex-end;z-index:300}
.mb.op{display:flex}
.mo{
  background:var(--surf);
  border-radius:20px 20px 0 0;
  padding:18px 16px 32px;
  width:100%;
  max-width:560px;
  margin:0 auto;
  height: 80vh;
  overflow-y:auto;
  animation:up .25s ease-out;
  position:relative;
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:40px;height:5px;background:var(--bdr);border-radius:3px;margin:0 auto 16px}
.mo h3{font-size:1rem;font-weight:700;margin-bottom:12px}

/* ===== POPOVER MENU ===== */
.pm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.15);display:none;z-index:400}
.pm-overlay.op{display:block}
.pm-box{
  position:absolute;top:56px;right:16px;width:310px;
  background:var(--surf);border-radius:16px;padding:20px 16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  transform-origin:top right;
  animation:pop .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border:0.5px solid var(--bdr);
}
.dk .pm-box{box-shadow:0 10px 40px rgba(0,0,0,0.6)}
@keyframes pop{
  from{opacity:0;transform:scale(0.8)}
  to{opacity:1;transform:scale(1)}
}

.tr{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px}
.tp{padding:8px 4px;border:1.5px solid var(--bdr);border-radius:10px;background:var(--surf2);color:var(--muted);cursor:pointer;text-align:center;font-size:.72rem;font-weight:600;transition:all .15s}
.tp.sl{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
.tpi{font-size:1.1rem;display:block;margin-bottom:2px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input[type=text],.fg input[type=number]{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:8px;color:var(--text);padding:9px 11px;font-size:.9rem;font-family:inherit}
.fg input:focus{outline:none;border-color:var(--acc)}
.pr{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ch{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--surf2);color:var(--text);font-size:.78rem;cursor:pointer;font-weight:500}
.ch:hover,.ch.sl{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
.ch.ac{border-style:dashed;color:var(--muted)}
.tp2{background:var(--surf2);border-radius:10px;padding:9px;margin-bottom:10px}
.qt2{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.qt{padding:4px 9px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--surf);color:var(--text);font-size:.76rem;cursor:pointer;font-weight:500}
.qt:hover{border-color:var(--acc);background:var(--acc-soft);color:var(--acc)}
.dw{display:flex;align-items:center;justify-content:center;gap:5px}
.dr{width:66px;height:114px;overflow:hidden;position:relative;border-radius:8px;background:var(--surf);border:1.5px solid var(--bdr)}
.di{position:absolute;width:100%;transition:transform .12s ease}
.dm{height:38px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;color:var(--muted)}
.dm.sl{color:var(--text);font-size:1.3rem}
.dm.nr{color:var(--text);opacity:.65}
.dr::before,.dr::after{content:'';position:absolute;left:0;right:0;height:38px;z-index:2;pointer-events:none}
.dr::before{top:0;background:linear-gradient(to bottom,var(--surf) 30%,transparent)}
.dr::after{bottom:0;background:linear-gradient(to top,var(--surf) 30%,transparent)}
.dsl2{position:absolute;left:5px;right:5px;height:38px;top:50%;transform:translateY(-50%);border-top:1.5px solid var(--acc);border-bottom:1.5px solid var(--acc);border-radius:5px;pointer-events:none;z-index:3}
.dc2{font-size:1.4rem;font-weight:700;color:var(--text);padding:0 1px}
.mb2{display:flex;gap:7px;margin-top:13px}
.bp{flex:1;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:11px;font-size:.9rem;font-weight:700;cursor:pointer}
.bs{flex:1;background:var(--surf2);color:var(--text);border:1px solid var(--bdr);border-radius:10px;padding:11px;font-size:.9rem;cursor:pointer}
.bd2{background:#ffeaea;color:#e17055;border:1px solid #ffcccc;border-radius:10px;padding:11px 13px;font-size:.9rem;cursor:pointer;text-align:center;}
.dk .bd2{background:#3d1515;border-color:#5c2020;color:#ff7675}
.ch2{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.ch2 span{text-align:center;font-size:.68rem;color:var(--muted);font-weight:600}
.dpg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dd{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.78rem;cursor:pointer;background:var(--surf2);color:var(--muted);border:none}
.dd.em{background:transparent;cursor:default}
.dd.td3{border:1.5px solid var(--acc);color:var(--text);font-weight:700}
.dd.ds{background:var(--acc);color:#fff;font-weight:700}
.dd.fu{opacity:.3;cursor:not-allowed}
.dpn{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dpn button{background:var(--surf2);border:none;color:var(--text);width:28px;height:28px;border-radius:7px;cursor:pointer}
.dpn h3{font-size:.9rem;font-weight:700;margin:0}
.date-sel{background:var(--surf2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1.5px solid var(--bdr)}
.date-sel:hover{border-color:var(--acc)}
.date-sel-v{font-size:.88rem;color:var(--acc);font-weight:600}
.eh{display:flex;gap:7px;margin-bottom:10px}
.ec{flex:1;background:var(--surf);border-radius:10px;padding:10px 6px;text-align:center;border:0.5px solid var(--bdr)}
.en{font-size:1rem;font-weight:800;color:var(--danger)}
.el{font-size:.62rem;color:var(--muted);margin-top:2px}
.ei{background:var(--surf);border-radius:10px;padding:10px 12px;margin-bottom:7px;border:0.5
