<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日打卡</title>
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #242438;
    --accent: #7c6fff;
    --accent2: #ff6f91;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --success: #6fffa8;
    --radius: 12px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* Auth screen */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
    padding: 24px;
  }

  .logo-area { text-align: center; }
  .logo-area h1 { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
  .logo-area h1 span { color: var(--accent); }
  .logo-area p { color: var(--text-muted); margin-top: 8px; }

  #google-signin-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #google-signin-btn:hover { opacity: 0.9; }
  #google-signin-btn img { width: 20px; }

  /* Main app */
  #app { display: none; }

  header {
    background: var(--surface);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ffffff10;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 { font-size: 1.1rem; font-weight: 600; }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-info img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
  }

  .signout-btn {
    background: none;
    border: 1px solid #ffffff20;
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid #ffffff10;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.9rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }

  /* Checkin card */
  .checkin-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .checkin-card h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .date-nav button {
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
  }

  .date-nav button:disabled { opacity: 0.3; cursor: default; }
  .date-display { font-weight: 600; font-size: 1rem; }

  /* Toggle items */
  .habit-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .habit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .habit-name {
    font-size: 1rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .habit-emoji { font-size: 1.3rem; }

  .toggle-btn {
    width: 52px;
    height: 28px;
    border-radius: 14px;
    border: none;
    background: #ffffff20;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }

  .toggle-btn.on { background: var(--accent); }

  .toggle-btn::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  .toggle-btn.on::after { transform: translateX(24px); }

  .habit-input {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .habit-input input {
    background: var(--bg);
    border: 1px solid #ffffff15;
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 0.95rem;
    width: 100px;
    text-align: center;
  }

  .habit-input input:disabled { opacity: 0.4; }
  .habit-input label { color: var(--text-muted); font-size: 0.9rem; }

  .save-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }

  .save-btn:hover { opacity: 0.9; }
  .save-btn:disabled { opacity: 0.5; cursor: default; }

  .save-msg {
    text-align: center;
    color: var(--success);
    font-size: 0.9rem;
    margin-top: 10px;
    height: 20px;
  }

  /* Stats */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .month-nav button {
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
  }

  .month-display { font-weight: 600; font-size: 1rem; }

  .stat-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Calendar */
  .calendar {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }

  .calendar h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .cal-header span {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    background: var(--surface2);
    color: var(--text-muted);
    position: relative;
  }

  .cal-day.empty { background: transparent; }
  .cal-day.today { border: 1px solid var(--accent); color: var(--text); }
  .cal-day.full { background: var(--accent); color: #fff; }
  .cal-day.partial { background: #7c6fff44; color: var(--text); }

  /* Chart */
  .chart-area {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }

  .chart-area h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  canvas { width: 100% !important; }

  /* Settings */
  .settings-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .settings-card h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .setting-row label { font-size: 0.95rem; }

  .setting-row input {
    background: var(--surface2);
    border: 1px solid #ffffff15;
    border-radius: 8px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 0.95rem;
    width: 110px;
    text-align: center;
  }

  .settings-save-btn {
    width: 100%;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid #ffffff15;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .settings-save-btn:hover { background: var(--accent); }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .sheet-link {
    display: block;
    text-align: center;
    color: var(--accent);
    font-size: 0.85rem;
    margin-top: 12px;
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="logo-area">
    <h1>每日<span>打卡</span></h1>
    <p>追蹤運動與睡眠，建立好習慣</p>
  </div>
  <button id="google-signin-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    使用 Google 帳號登入
  </button>
  <div id="auth-error" style="color:#ff6f91;font-size:0.9rem;display:none;"></div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <h1>每日打卡 ✦</h1>
    <div class="user-info">
      <img id="user-avatar" src="" alt="">
      <button class="signout-btn" onclick="signOut()">登出</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('checkin')">打卡</button>
    <button class="tab-btn" onclick="switchTab('stats')">統計</button>
    <button class="tab-btn" onclick="switchTab('settings')">設定</button>
  </div>

  <!-- 打卡 Tab -->
  <div id="tab-checkin" class="tab-content active">
    <div class="checkin-card">
      <div class="date-nav">
        <button id="prev-day-btn" onclick="changeDay(-1)">‹</button>
        <span class="date-display" id="date-display"></span>
        <button id="next-day-btn" onclick="changeDay(1)">›</button>
      </div>

      <div class="habit-item">
        <div class="habit-header">
          <div class="habit-name"><span class="habit-emoji">🏃</span> 運動</div>
          <button class="toggle-btn" id="exercise-toggle" onclick="toggleHabit('exercise')"></button>
        </div>
        <div class="habit-input">
          <input type="number" id="exercise-minutes" min="0" max="999" placeholder="0" disabled>
          <label>分鐘</label>
        </div>
      </div>

      <div class="habit-item">
        <div class="habit-header">
          <div class="habit-name"><span class="habit-emoji">🌙</span> 睡覺時間</div>
          <button class="toggle-btn" id="sleep-toggle" onclick="toggleHabit('sleep')"></button>
        </div>
        <div class="habit-input">
          <input type="time" id="sleep-time" disabled>
        </div>
      </div>

      <button class="save-btn" id="save-btn" onclick="saveCheckin()">儲存打卡</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
    <a class="sheet-link" id="sheet-link" href="#" target="_blank" style="display:none">📊 查看 Google Sheet 原始資料</a>
  </div>

  <!-- 統計 Tab -->
  <div id="tab-stats" class="tab-content">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-display" id="month-display"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-number" id="stat-exercise">-</div>
        <div class="stat-label">運動達標天數</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-sleep">-</div>
        <div class="stat-label">準時睡覺天數</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-exercise-min">-</div>
        <div class="stat-label">總運動分鐘</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-both">-</div>
        <div class="stat-label">雙達標天數</div>
      </div>
    </div>

    <div class="calendar">
      <h3>月曆</h3>
      <div class="cal-header">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div class="chart-area">
      <h3>運動分鐘趨勢</h3>
      <canvas id="exercise-chart" height="120"></canvas>
    </div>

    <div class="chart-area">
      <h3>睡覺時間趨勢</h3>
      <canvas id="sleep-chart" height="120"></canvas>
    </div>
  </div>

  <!-- 設定 Tab -->
  <div id="tab-settings" class="tab-content">
    <div class="settings-card">
      <h3>達標設定</h3>
      <div class="setting-row">
        <label>🏃 運動目標</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="setting-exercise" min="1" max="999" placeholder="30">
          <span style="color:var(--text-muted);font-size:0.85rem">分鐘</span>
        </div>
      </div>
      <div class="setting-row">
        <label>🌙 睡覺目標</label>
        <input type="time" id="setting-sleep">
      </div>
      <button class="settings-save-btn" onclick="saveSettings()">儲存設定</button>
      <div class="save-msg" id="settings-msg"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ===== CONFIG =====
const CLIENT_ID = '356208945340-11cretd36ev8chp83lj6d82ttvt1r0tn.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file profile email';

// ===== STATE =====
let tokenClient;
let accessToken = null;
let userInfo = null;
let sheetId = null;
let allData = {}; // { "YYYY-MM-DD": { exercise: bool, exerciseMin: int, sleep: bool, sleepTime: "HH:MM" } }
let settings = { exerciseGoal: 30, sleepGoal: '23:00' };
let currentDate = new Date();
let statsMonth = new Date();
let exerciseChart = null;
let sleepChart = null;

// ===== DATE HELPERS =====
function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

function formatDate(d) {
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}月${d.getDate()}日（週${days[d.getDay()]}）`;
}

function isToday(d) {
  const t = new Date();
  return dateKey(d) === dateKey(t);
}

function isYesterday(d) {
  const y = new Date();
  y.setDate(y.getDate() - 1);
  return dateKey(d) === dateKey(y);
}

// ===== AUTH =====
window.onload = () => {
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = initGSI;
  document.head.appendChild(script);
};

function initGSI() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showAuthError(resp.error); return; }
      accessToken = resp.access_token;
      await loadUserInfo();
      await initUserSheet();
      loadCheckinUI();
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }
  });
}

document.getElementById('google-signin-btn').onclick = () => {
  tokenClient.requestAccessToken({ prompt: 'consent' });
};

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken);
  accessToken = null;
  userInfo = null;
  sheetId = null;
  allData = {};
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

async function loadUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  userInfo = await res.json();
  document.getElementById('user-avatar').src = userInfo.picture;
}

// ===== GOOGLE SHEETS =====
async function initUserSheet() {
  // Search for existing sheet
  const searchRes = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='habit-tracker-${userInfo.sub}'and mimeType='application/vnd.google-apps.spreadsheet'&spaces=drive`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const searchData = await searchRes.json();

  if (searchData.files && searchData.files.length > 0) {
    sheetId = searchData.files[0].id;
  } else {
    // Create new sheet
    const createRes = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${accessToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        properties: { title: `habit-tracker-${userInfo.sub}` },
        sheets: [
          { properties: { title: 'data' } },
          { properties: { title: 'settings' } }
        ]
      })
    });
    const createData = await createRes.json();
    sheetId = createData.spreadsheetId;

    // Init headers
    await sheetsWrite('data!A1:E1', [['日期','運動','運動分鐘','睡覺','睡覺時間']]);
    await sheetsWrite('settings!A1:B2', [['exerciseGoal','sleepGoal'],['30','23:00']]);
  }

  document.getElementById('sheet-link').href = `https://docs.google.com/spreadsheets/d/${sheetId}`;
  document.getElementById('sheet-link').style.display = 'block';

  await loadAllData();
  await loadSettings();
}

async function sheetsWrite(range, values) {
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?valueInputOption=RAW`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${accessToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ values })
  });
}

async function sheetsAppend(values) {
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/data!A:E:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${accessToken}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ values })
  });
}

async function loadAllData() {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/data!A2:E`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  allData = {};
  if (data.values) {
    for (const row of data.values) {
      const [date, exercise, exerciseMin, sleep, sleepTime] = row;
      if (date) {
        allData[date] = {
          exercise: exercise === 'TRUE',
          exerciseMin: parseInt(exerciseMin) || 0,
          sleep: sleep === 'TRUE',
          sleepTime: sleepTime || ''
        };
      }
    }
  }
}

async function loadSettings() {
  const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/settings!A2:B2`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const data = await res.json();
  if (data.values && data.values[0]) {
    settings.exerciseGoal = parseInt(data.values[0][0]) || 30;
    settings.sleepGoal = data.values[0][1] || '23:00';
  }
  document.getElementById('setting-exercise').value = settings.exerciseGoal;
  document.getElementById('setting-sleep').value = settings.sleepGoal;
}

async function saveSettings() {
  settings.exerciseGoal = parseInt(document.getElementById('setting-exercise').value) || 30;
  settings.sleepGoal = document.getElementById('setting-sleep').value || '23:00';
  await sheetsWrite('settings!A2:B2', [[settings.exerciseGoal, settings.sleepGoal]]);
  const msg = document.getElementById('settings-msg');
  msg.textContent = '✓ 已儲存';
  setTimeout(() => msg.textContent = '', 2000);
  updateStats();
}

// ===== CHECKIN UI =====
function loadCheckinUI() {
  updateDateDisplay();
  loadDateData();
  updateStats();
}

function updateDateDisplay() {
  document.getElementById('date-display').textContent = formatDate(currentDate);
  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);

  document.getElementById('prev-day-btn').disabled = !isYesterday(currentDate) && !isToday(currentDate);
  // Only allow today and yesterday
  const diff = Math.round((today - currentDate) / 86400000);
  document.getElementById('prev-day-btn').disabled = diff >= 1;
  document.getElementById('next-day-btn').disabled = isToday(currentDate);
}

function changeDay(delta) {
  const newDate = new Date(currentDate);
  newDate.setDate(newDate.getDate() + delta);
  const today = new Date();
  const diff = Math.round((today - newDate) / 86400000);
  if (diff < 0 || diff > 1) return;
  currentDate = newDate;
  updateDateDisplay();
  loadDateData();
}

function loadDateData() {
  const key = dateKey(currentDate);
  const d = allData[key] || {};

  const exToggle = document.getElementById('exercise-toggle');
  const exMin = document.getElementById('exercise-minutes');
  const slToggle = document.getElementById('sleep-toggle');
  const slTime = document.getElementById('sleep-time');

  if (d.exercise) { exToggle.classList.add('on'); exMin.disabled = false; }
  else { exToggle.classList.remove('on'); exMin.disabled = true; }

  exMin.value = d.exerciseMin || '';

  if (d.sleep) { slToggle.classList.add('on'); slTime.disabled = false; }
  else { slToggle.classList.remove('on'); slTime.disabled = true; }

  slTime.value = d.sleepTime || '';
}

function toggleHabit(type) {
  if (type === 'exercise') {
    const btn = document.getElementById('exercise-toggle');
    const inp = document.getElementById('exercise-minutes');
    btn.classList.toggle('on');
    inp.disabled = !btn.classList.contains('on');
  } else {
    const btn = document.getElementById('sleep-toggle');
    const inp = document.getElementById('sleep-time');
    btn.classList.toggle('on');
    inp.disabled = !btn.classList.contains('on');
  }
}

async function saveCheckin() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '儲存中...';

  const key = dateKey(currentDate);
  const exercise = document.getElementById('exercise-toggle').classList.contains('on');
  const exerciseMin = parseInt(document.getElementById('exercise-minutes').value) || 0;
  const sleep = document.getElementById('sleep-toggle').classList.contains('on');
  const sleepTime = document.getElementById('sleep-time').value;

  allData[key] = { exercise, exerciseMin, sleep, sleepTime };

  // Rewrite entire data sheet
  const rows = [['日期','運動','運動分鐘','睡覺','睡覺時間']];
  for (const [date, d] of Object.entries(allData)) {
    rows.push([date, d.exercise.toString().toUpperCase(), d.exerciseMin, d.sleep.toString().toUpperCase(), d.sleepTime]);
  }
  await sheetsWrite(`data!A1:E${rows.length}`, rows);

  btn.disabled = false;
  btn.textContent = '儲存打卡';

  const msg = document.getElementById('save-msg');
  msg.textContent = '✓ 已儲存';
  setTimeout(() => msg.textContent = '', 2000);

  updateStats();
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['checkin','stats','settings'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'stats') updateStats();
}

// ===== STATS =====
function changeMonth(delta) {
  statsMonth = new Date(statsMonth.getFullYear(), statsMonth.getMonth() + delta, 1);
  updateStats();
}

function updateStats() {
  const year = statsMonth.getFullYear();
  const month = statsMonth.getMonth();
  document.getElementById('month-display').textContent = `${year}年${month+1}月`;

  const daysInMonth = new Date(year, month+1, 0).getDate();
  let exerciseDays = 0, sleepDays = 0, bothDays = 0, totalMin = 0;

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = allData[key];
    if (!rec) continue;
    const exOk = rec.exercise && rec.exerciseMin >= settings.exerciseGoal;
    const slOk = rec.sleep && rec.sleepTime && rec.sleepTime <= settings.sleepGoal;
    if (exOk) exerciseDays++;
    if (slOk) sleepDays++;
    if (exOk && slOk) bothDays++;
    if (rec.exercise) totalMin += rec.exerciseMin;
  }

  document.getElementById('stat-exercise').textContent = exerciseDays;
  document.getElementById('stat-sleep').textContent = sleepDays;
  document.getElementById('stat-exercise-min').textContent = totalMin;
  document.getElementById('stat-both').textContent = bothDays;

  renderCalendar(year, month, daysInMonth);
  renderExerciseChart(year, month, daysInMonth);
  renderSleepChart(year, month, daysInMonth);
}

function renderCalendar(year, month, daysInMonth) {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(year, month, 1).getDay();
  const today = new Date();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = allData[key];
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;

    const isT = (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d);
    if (isT) el.classList.add('today');

    if (rec) {
      const exOk = rec.exercise && rec.exerciseMin >= settings.exerciseGoal;
      const slOk = rec.sleep && rec.sleepTime && rec.sleepTime <= settings.sleepGoal;
      if (exOk && slOk) el.classList.add('full');
      else if (exOk || slOk) el.classList.add('partial');
    }

    grid.appendChild(el);
  }
}

function renderExerciseChart(year, month, daysInMonth) {
  const labels = [], data = [], goalLine = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = allData[key];
    labels.push(d);
    data.push(rec && rec.exercise ? rec.exerciseMin : 0);
    goalLine.push(settings.exerciseGoal);
  }

  if (exerciseChart) exerciseChart.destroy();
  const ctx = document.getElementById('exercise-chart').getContext('2d');
  exerciseChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '運動分鐘',
          data,
          backgroundColor: '#7c6fff88',
          borderColor: '#7c6fff',
          borderWidth: 1,
          borderRadius: 4
        },
        {
          label: `目標 ${settings.exerciseGoal} 分鐘`,
          data: goalLine,
          type: 'line',
          borderColor: '#ff6f9188',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8888aa', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#ffffff08' } },
        y: { ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#ffffff08' }, beginAtZero: true }
      }
    }
  });
}

function renderSleepChart(year, month, daysInMonth) {
  const labels = [], data = [];
  const goalHour = parseInt(settings.sleepGoal.split(':')[0]);
  const goalMin = parseInt(settings.sleepGoal.split(':')[1]);

  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = allData[key];
    labels.push(d);
    if (rec && rec.sleep && rec.sleepTime) {
      let [h, m] = rec.sleepTime.split(':').map(Number);
      // Normalize: treat hours < 6 as next-day (e.g. 1:00 -> 25:00)
      if (h < 6) h += 24;
      data.push(h + m / 60);
    } else {
      data.push(null);
    }
  }

  const goalVal = goalHour < 6 ? goalHour + 24 + goalMin/60 : goalHour + goalMin/60;

  if (sleepChart) sleepChart.destroy();
  const ctx = document.getElementById('sleep-chart').getContext('2d');
  sleepChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '睡覺時間',
          data,
          borderColor: '#6fffa8',
          backgroundColor: '#6fffa820',
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#6fffa8',
          fill: true,
          spanGaps: true,
          tension: 0.3
        },
        {
          label: `目標 ${settings.sleepGoal}`,
          data: Array(daysInMonth).fill(goalVal),
          borderColor: '#ff6f9188',
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8888aa', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#ffffff08' } },
        y: {
          ticks: {
            color: '#8888aa',
            font: { size: 10 },
            callback: v => {
              const h = Math.floor(v) % 24;
              const m = Math.round((v % 1) * 60);
              return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            }
          },
          grid: { color: '#ffffff08' }
        }
      }
    }
  });
}
</script>
